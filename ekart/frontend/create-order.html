<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Order - EKART</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/customer-dashboard.html">EKART</a>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
  </nav>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-primary text-white">Create New Delivery Order</div>
          <div class="card-body">
            <form id="createOrderForm">
              <div class="mb-3">
                <label>Pickup Address</label>
                <textarea id="pickupAddress" rows="2" class="form-control" required></textarea>
              </div>
              <div class="mb-3">
                <label>Delivery Address</label>
                <textarea id="deliveryAddress" rows="2" class="form-control" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100">Place Order</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/create-order.js"></script>
</body>
</html>
