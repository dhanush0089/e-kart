<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EKART</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">EKART</a>
    </div>
  </nav>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-primary text-white">Login</div>
          <div class="card-body">
            <form id="loginForm">
              <div class="mb-3">
                <label>Email address</label>
                <input type="email" id="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="mt-3 text-center">Don't have an account? <a href="/register.html">Register</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-container"></div>

  <script>
    // Direct inline script – no external dependencies except Bootstrap for toasts
    const API_BASE = 'http://localhost:5000/api';
    
    function showToast(message, type) {
      const container = document.querySelector('.toast-container');
      if (!container) return;
      const toastDiv = document.createElement('div');
      toastDiv.className = `toast align-items-center text-white bg-${type === 'danger' ? 'danger' : 'success'} border-0`;
      toastDiv.setAttribute('role', 'alert');
      toastDiv.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
      container.appendChild(toastDiv);
      const bsToast = new bootstrap.Toast(toastDiv, { delay: 3000 });
      bsToast.show();
      toastDiv.addEventListener('hidden.bs.toast', () => toastDiv.remove());
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      console.log('Login clicked');  // Should appear in console
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) {
        showToast('Please fill all fields', 'danger');
        return;
      }
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('userId', data.userId);
          localStorage.setItem('name', data.name);
          showToast('Login successful');
          setTimeout(() => {
            if (data.role === 'manager') window.location.href = '/manager-dashboard.html';
            else if (data.role === 'delivery') window.location.href = '/delivery-dashboard.html';
            else window.location.href = '/customer-dashboard.html';
          }, 1000);
        } else {
          showToast(data.error, 'danger');
        }
      } catch (err) {
        console.error(err);
        showToast('Server error - is backend running?', 'danger');
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
