<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EKART</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">EKART</a>
    </div>
  </nav>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-success text-white">Register</div>
          <div class="card-body">
            <form id="registerForm">
              <div class="mb-3">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
              </div>
              <div class="mb-3">
                <label>Role</label>
                <select id="role" class="form-select">
                  <option value="customer">Customer</option>
                  <option value="delivery">Delivery Man</option>
                  <option value="manager">Manager</option>
                </select>
              </div>
              <div class="mb-3" id="addressField">
                <label>Address (for customer)</label>
                <input type="text" id="address" class="form-control">
              </div>
              <button type="submit" class="btn btn-success w-100">Register</button>
            </form>
            <p class="mt-3 text-center">Already have an account? <a href="/login.html">Login</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-container"></div>
  <script>
    document.getElementById('role').addEventListener('change', function() {
      const addrField = document.getElementById('addressField');
      addrField.style.display = this.value === 'customer' ? 'block' : 'none';
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
